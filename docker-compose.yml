version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: budgetapp-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: budgetapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - budget-network

  backend:
    build:
      context: ./backend
    container_name: budgetapp-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/budgetapp
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=your_secure_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - postgres-db
    networks:
      - budget-network

  frontend:
    build:
      context: ./frontend
    container_name: budgetapp-frontend
    ports:
      - "3000:80"
    environment:
      # Pamiętaj, aby w kodzie frontendu używać zmiennej środowiskowej
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - budget-network

volumes:
  postgres_data:

networks:
  budget-network:
    driver: bridge